name: Build ARM64 Images

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - '.github/workflows/build-arm64.yml'
  schedule:
    # Every Sunday at 02:00 UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.image.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        image:
          - name: project-nomad
            context: upstream/
            dockerfile: upstream/Dockerfile
            tag: ghcr.io/${{ github.repository_owner }}/project-nomad:latest

          - name: project-nomad-sidecar-updater
            context: upstream/install/sidecar-updater/
            dockerfile: upstream/install/sidecar-updater/Dockerfile
            tag: ghcr.io/${{ github.repository_owner }}/project-nomad-sidecar-updater:latest

          - name: project-nomad-disk-collector
            context: upstream/install/sidecar-disk-collector/
            dockerfile: upstream/install/sidecar-disk-collector/Dockerfile
            tag: ghcr.io/${{ github.repository_owner }}/project-nomad-disk-collector:latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout upstream project-nomad
        uses: actions/checkout@v4
        with:
          repository: Crosstalk-Solutions/project-nomad
          path: upstream

      - name: Set up QEMU (for ARM64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ matrix.image.tag }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
